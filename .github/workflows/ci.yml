name: CI — FRED Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ \
            --tb=short \
            --cov=ingestion \
            --cov=transforms \
            --cov-report=term-missing \
            -v
        env:
          FRED_API_KEY: test_key_ci

      - name: Lint with ruff
        run: ruff check ingestion/ transforms/
        continue-on-error: true

  dbt-compile:
    name: Validate dbt models compile
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fred_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-postgres

      - name: dbt compile
        run: |
          cd dbt_project
          dbt compile --profiles-dir ${{ github.workspace }}/dbt_project --target ci
        env:
          DBT_TARGET: ci